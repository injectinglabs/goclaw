name: Deploy to Staging

on:
  push:
    branches: [dev]

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  GOCLAW_REPO: goclaw-custom
  ROLE_ARN: arn:aws:iam::707600960562:role/github-actions-goclaw
  # Staging EC2 is found by tag — no IP/host secret needed.
  STAGING_EC2_TAG: openclaw-staging

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC → AWS STS
      contents: read
    outputs:
      image: ${{ steps.emit.outputs.image }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.GOCLAW_REPO }} \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name ${{ env.GOCLAW_REPO }} \
            --region ${{ env.AWS_REGION }} --image-scanning-configuration scanOnPush=true

      - name: Short SHA
        id: meta
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GoClaw image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # ENABLE_FULL_SKILLS pulls in python3+pip, nodejs+npm, pandoc,
          # the github-cli, and the bundled skill dependencies (pypdf,
          # openpyxl, pandas, python-pptx, markitdown, docx, pptxgenjs).
          # Without it the container ships as the minimal "latest"
          # variant — `/app/skills/` ends up empty and python3 is
          # missing, so pdf/docx/xlsx/pptx skills can't run at all.
          build-args: |
            ENABLE_FULL_SKILLS=true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:staging
            ${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:${{ steps.meta.outputs.sha }}
          cache-from: type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:buildcache
          cache-to: type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:buildcache,mode=max

      - name: Emit image ref
        id: emit
        run: echo "image=${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:staging" >> $GITHUB_OUTPUT

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Notify Telegram — deploy started
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"🟡 GOCLAW STAGING DEPLOY\\nCommit: ${{ needs.build.outputs.sha }}\"}" > /dev/null

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy goclaw container via SSM
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          GOCLAW_IMAGE="$REGISTRY/${{ env.GOCLAW_REPO }}:staging"

          CMD_ID=$(aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --targets "Key=tag:Name,Values=${{ env.STAGING_EC2_TAG }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -e\",
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY\",
              \"docker pull $GOCLAW_IMAGE\",
              \"export AUTH_PROXY_IMAGE=$REGISTRY/goclaw-auth-proxy:staging\",
              \"export CONNECTORS_MCP_IMAGE=$REGISTRY/goclaw-connectors-mcp:staging\",
              \"export DOCUMENT_MCP_IMAGE=$REGISTRY/goclaw-document-mcp:staging\",
              \"export GOCLAW_IMAGE=$GOCLAW_IMAGE\",
              \"cd /opt/goclaw-service && docker compose up -d --no-deps goclaw\",
              \"for i in \$(seq 1 20); do docker exec goclaw-service-goclaw-1 wget -qO- http://localhost:9001/health 2>/dev/null | grep -q ok && echo GoClaw healthy && exit 0; sleep 2; done\",
              \"echo ERROR: health check timed out && exit 1\"
            ]" \
            --query "Command.CommandId" --output text)

          echo "SSM command: $CMD_ID"

          # Poll until the command finishes
          for i in $(seq 1 60); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$CMD_ID" \
              --region ${{ env.AWS_REGION }} \
              --details \
              --query 'CommandInvocations[0].Status' --output text 2>/dev/null || echo Pending)
            echo "[$i] $STATUS"
            case "$STATUS" in
              Success) echo "Deploy succeeded"; exit 0 ;;
              Failed|Cancelled|TimedOut|DeliveryTimedOut|ExecutionTimedOut)
                aws ssm list-command-invocations \
                  --command-id "$CMD_ID" --region ${{ env.AWS_REGION }} --details \
                  --query 'CommandInvocations[0].CommandPlugins[0].Output' --output text
                exit 1 ;;
            esac
            sleep 5
          done
          echo "ERROR: SSM command polling timed out" && exit 1

      - name: Notify Telegram — deploy result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="🟢"
          [ "$STATUS" != "success" ] && EMOJI="🔴"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$EMOJI GOCLAW STAGING $STATUS\\nCommit: ${{ needs.build.outputs.sha }}\"}" > /dev/null
