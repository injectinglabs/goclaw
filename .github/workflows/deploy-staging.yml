name: Deploy to Staging

on:
  push:
    branches: [dev]

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  GOCLAW_REPO: goclaw-custom
  ROLE_ARN: arn:aws:iam::707600960562:role/github-actions-goclaw
  # Staging EC2 is found by tag — no IP/host secret needed.
  STAGING_EC2_TAG: openclaw-staging

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC → AWS STS
      contents: read
    outputs:
      image: ${{ steps.emit.outputs.image }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.GOCLAW_REPO }} \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name ${{ env.GOCLAW_REPO }} \
            --region ${{ env.AWS_REGION }} --image-scanning-configuration scanOnPush=true

      - name: Short SHA
        id: meta
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GoClaw image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # ENABLE_FULL_SKILLS pulls in python3+pip, nodejs+npm, pandoc,
          # the github-cli, and the bundled skill dependencies (pypdf,
          # openpyxl, pandas, python-pptx, markitdown, docx, pptxgenjs).
          # Without it the container ships as the minimal "latest"
          # variant — `/app/skills/` ends up empty and python3 is
          # missing, so pdf/docx/xlsx/pptx skills can't run at all.
          build-args: |
            ENABLE_FULL_SKILLS=true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:staging
            ${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:${{ steps.meta.outputs.sha }}
          cache-from: type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:buildcache
          cache-to: type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:buildcache,mode=max

      - name: Emit image ref
        id: emit
        run: echo "image=${{ steps.ecr.outputs.registry }}/${{ env.GOCLAW_REPO }}:staging" >> $GITHUB_OUTPUT

  # The fork's job stops at the built+pushed image. Deployment itself
  # (.env regen, docker-compose write, sidecar restart, MCP tenant-sync)
  # lives in the injecting-ai-goclaw repo because that's where the
  # secrets and compose template are. We fire a repository_dispatch to
  # kick off its `Deploy to Staging` workflow once the new goclaw image
  # is in ECR. Avoids two workflows racing each other on the same SSM
  # agent / docker-compose host.
  dispatch:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger injecting-ai-goclaw deploy
        env:
          GH_TOKEN: ${{ secrets.INJECTING_AI_GOCLAW_DISPATCH_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/injectinglabs/injecting-ai-goclaw/dispatches \
            -d "{\"event_type\":\"goclaw-image-updated\",\"client_payload\":{\"sha\":\"${{ needs.build.outputs.sha }}\",\"image\":\"${{ needs.build.outputs.image }}\"}}"

      - name: Notify Telegram — image pushed, deploy dispatched
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="🟢"
          [ "$STATUS" != "success" ] && EMOJI="🔴"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$EMOJI GoClaw image ${{ needs.build.outputs.sha }} → dispatch $STATUS\"}" > /dev/null
